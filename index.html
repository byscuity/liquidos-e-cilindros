<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Recipientes Cilíndricos - Troca de Líquidos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #0f0f1a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1000" height="600"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            const W = 1000;
            const H = 600;
            canvas.width = W;
            canvas.height = H;
            
            // Posições dos recipientes
            const leftCylX = 250;
            const rightCylX = 750;
            const cylinderY = 200;
            const cylinderRadius = 80;
            const cylinderHeight = 320;
            
            // Alturas dos líquidos (em pixels, relativo ao fundo)
            let leftLiquidHeight = cylinderHeight;      // começa cheio (3/4 da altura total? não, começa cheio)
            let rightLiquidHeight = 0;                   // começa vazio
            
            // Estado da animação
            let phase = 0; // 0: left diminuindo, right subindo; 1: pausa; 2: left subindo, right diminuindo; 3: pausa
            let progress = 0; // 0 a 1
            let lastTimestamp = 0;
            let animationId = null;
            
            // Parâmetros
            const transitionDuration = 2000; // 2 segundos para transição
            const pauseDuration = 500;        // 0.5 segundos de pausa
            
            // Níveis alvo (proporção da altura do cilindro)
            const TARGET_LEFT_LOW = cylinderHeight * 0.25;     // 1/4 do recipiente
            const TARGET_LEFT_HIGH = cylinderHeight * 0.75;    // 3/4 do recipiente
            const TARGET_RIGHT_LOW = cylinderHeight * 0.25;    // 1/4 do recipiente
            const TARGET_RIGHT_HIGH = cylinderHeight * 0.75;   // 3/4 do recipiente
            
            let startLeftHeight = cylinderHeight;
            let startRightHeight = 0;
            let targetLeftHeight = TARGET_LEFT_LOW;
            let targetRightHeight = TARGET_RIGHT_HIGH;
            
            let pauseStartTime = 0;
            let transitionStartTime = 0;
            let currentState = "transition"; // "transition" ou "pause"
            
            // Função para desenhar cilindro 3D transparente
            function drawCylinder(x, y, radius, height, liquidHeight, liquidColor) {
                const topY = y;
                const bottomY = y + height;
                const liquidBottomY = bottomY;
                const liquidTopY = bottomY - liquidHeight;
                
                // 1. Desenhar a face inferior do cilindro (elipse) - parte de trás
                ctx.save();
                
                // Corpo do cilindro (superfície lateral transparente)
                ctx.beginPath();
                ctx.rect(x - radius, topY, radius * 2, height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Desenhar as bordas verticais do cilindro
                ctx.beginPath();
                ctx.moveTo(x - radius, topY);
                ctx.lineTo(x - radius, bottomY);
                ctx.moveTo(x + radius, topY);
                ctx.lineTo(x + radius, bottomY);
                ctx.stroke();
                
                // Face superior (elipse)
                ctx.beginPath();
                ctx.ellipse(x, topY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Face inferior (elipse - fundo)
                ctx.beginPath();
                ctx.ellipse(x, bottomY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
                ctx.stroke();
                
                // ========== LÍQUIDO ==========
                if (liquidHeight > 0) {
                    const liquidTopVisualY = liquidTopY;
                    const liquidBottomVisualY = bottomY;
                    
                    // Salvar contexto para clip do líquido dentro do cilindro
                    ctx.save();
                    ctx.beginPath();
                    ctx.ellipse(x, bottomY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.rect(x - radius, topY, radius * 2, height);
                    ctx.clip();
                    
                    // Desenhar o líquido (cor uniforme viva)
                    ctx.fillStyle = liquidColor;
                    ctx.fillRect(x - radius, liquidTopVisualY, radius * 2, liquidHeight);
                    
                    // Brilho sutil na superfície do líquido
                    ctx.beginPath();
                    ctx.ellipse(x, liquidTopVisualY, radius * 0.85, radius * 0.25, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.fill();
                    
                    ctx.restore();
                    
                    // Borda do líquido na superfície
                    ctx.beginPath();
                    ctx.ellipse(x, liquidTopVisualY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                
                // Reforçar bordas laterais novamente por cima do líquido
                ctx.beginPath();
                ctx.moveTo(x - radius, topY);
                ctx.lineTo(x - radius, bottomY);
                ctx.moveTo(x + radius, topY);
                ctx.lineTo(x + radius, bottomY);
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.6)';
                ctx.stroke();
                
                ctx.restore();
            }
            
            // Atualizar lógica de transição e pausa
            function updateAnimation(now) {
                if (currentState === "transition") {
                    const elapsed = now - transitionStartTime;
                    let t = Math.min(1, elapsed / transitionDuration);
                    
                    // Interpolação linear
                    leftLiquidHeight = startLeftHeight + (targetLeftHeight - startLeftHeight) * t;
                    rightLiquidHeight = startRightHeight + (targetRightHeight - startRightHeight) * t;
                    
                    if (t >= 1) {
                        // Garantir valores exatos
                        leftLiquidHeight = targetLeftHeight;
                        rightLiquidHeight = targetRightHeight;
                        
                        // Iniciar pausa
                        currentState = "pause";
                        pauseStartTime = now;
                    }
                } 
                else if (currentState === "pause") {
                    const paused = now - pauseStartTime;
                    if (paused >= pauseDuration) {
                        // Alternar os alvos para o próximo ciclo
                        if (targetLeftHeight === TARGET_LEFT_LOW) {
                            // Mudar: left vai para HIGH, right vai para LOW
                            startLeftHeight = leftLiquidHeight;
                            startRightHeight = rightLiquidHeight;
                            targetLeftHeight = TARGET_LEFT_HIGH;
                            targetRightHeight = TARGET_RIGHT_LOW;
                        } else {
                            // Mudar: left vai para LOW, right vai para HIGH
                            startLeftHeight = leftLiquidHeight;
                            startRightHeight = rightLiquidHeight;
                            targetLeftHeight = TARGET_LEFT_LOW;
                            targetRightHeight = TARGET_RIGHT_HIGH;
                        }
                        
                        // Iniciar nova transição
                        currentState = "transition";
                        transitionStartTime = now;
                    }
                }
            }
            
            // Função principal de animação
            function animate(timestamp) {
                if (!lastTimestamp) {
                    lastTimestamp = timestamp;
                    requestAnimationFrame(animate);
                    return;
                }
                
                // Inicializar tempos se necessário
                if (transitionStartTime === 0) {
                    transitionStartTime = timestamp;
                    startLeftHeight = cylinderHeight;
                    startRightHeight = 0;
                    targetLeftHeight = TARGET_LEFT_LOW;
                    targetRightHeight = TARGET_RIGHT_HIGH;
                    leftLiquidHeight = cylinderHeight;
                    rightLiquidHeight = 0;
                    currentState = "transition";
                }
                
                updateAnimation(timestamp);
                
                // Desenhar tudo
                ctx.clearRect(0, 0, W, H);
                
                // Fundo escuro
                ctx.fillStyle = '#0f0f1a';
                ctx.fillRect(0, 0, W, H);
                
                // Sombra suave nos cilindros
                ctx.shadowBlur = 0;
                
                // Desenhar recipiente ESQUERDO (líquido laranja)
                drawCylinder(leftCylX, cylinderY, cylinderRadius, cylinderHeight, leftLiquidHeight, '#FF8C42');
                
                // Desenhar recipiente DIREITO (líquido roxo)
                drawCylinder(rightCylX, cylinderY, cylinderRadius, cylinderHeight, rightLiquidHeight, '#9B59B6');
                
                // Pequena linha de chão sutil
                ctx.beginPath();
                ctx.moveTo(0, cylinderY + cylinderHeight + 10);
                ctx.lineTo(W, cylinderY + cylinderHeight + 10);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                animationId = requestAnimationFrame(animate);
            }
            
            // Iniciar animação
            animationId = requestAnimationFrame(animate);
            
            // Limpeza
            window.addEventListener('beforeunload', () => {
                if (animationId) cancelAnimationFrame(animationId);
            });
            
            console.log('Sistema ativo: líquido laranja ↔ roxo alternando entre 1/4 e 3/4');
        })();
    </script>
</body>
</html>
