<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Recipientes Cilíndricos - Laranja e Roxo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', monospace;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #0a0a0a;
            border-radius: 0px;
        }
    </style>
</head>
<body>
<canvas id="canvas" width="900" height="500"></canvas>

<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const W = 900;
        const H = 500;
        canvas.width = W;
        canvas.height = H;

        // Dimensões dos recipientes cilíndricos
        const cylinderWidth = 140;
        const cylinderHeight = 280;
        const leftCylX = 180;
        const rightCylX = W - 180 - cylinderWidth;
        const cylinderY = (H - cylinderHeight) / 2; // centralizado verticalmente

        // Raio das bordas arredondadas (opcional, para efeito cilíndrico)
        const radiusCorner = 12;

        // Níveis dos líquidos (altura em pixels, medida de cima para baixo)
        // Valores máximos = cylinderHeight, mínimos = 0
        let leftLiquidHeight = cylinderHeight;     // começa cheio (laranja)
        let rightLiquidHeight = cylinderHeight * 0.25; // começa com 1/4 (roxo)

        // Estado da animação
        let fase = 0; // 0 = laranja diminuindo (esq) e roxo subindo (dir)
                      // 1 = pausa
                      // 2 = reverso: laranja subindo, roxo descendo
                      // 3 = pausa
        let timer = 0;
        let lastTimestamp = 0;

        // Velocidade de transição (pixels por segundo)
        const transitionSpeed = 120; // pixels/segundo

        // Níveis alvo
        const leftFull = cylinderHeight;      // 100%
        const leftQuarter = cylinderHeight * 0.25;   // 1/4
        const rightFull = cylinderHeight;     // 100%
        const rightQuarter = cylinderHeight * 0.25;  // 1/4
        const rightThreeQuarters = cylinderHeight * 0.75; // 3/4

        // Estados alvos dinâmicos
        let leftTarget = leftQuarter;     // na fase 0: esquerda vai para 1/4
        let rightTarget = rightThreeQuarters; // direita vai para 3/4

        // Função para desenhar recipiente cilíndrico transparente com bordas
        function drawCylinder(x, y, w, h) {
            ctx.save();
            ctx.beginPath();
            // Retângulo com cantos arredondados (efeito cilíndrico suave)
            ctx.moveTo(x + radiusCorner, y);
            ctx.lineTo(x + w - radiusCorner, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radiusCorner);
            ctx.lineTo(x + w, y + h - radiusCorner);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radiusCorner, y + h);
            ctx.lineTo(x + radiusCorner, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radiusCorner);
            ctx.lineTo(x, y + radiusCorner);
            ctx.quadraticCurveTo(x, y, x + radiusCorner, y);
            ctx.closePath();
            
            // Preenchimento transparente (apenas para hit area? não, sem preenchimento)
            // Contorno branco fino
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.2;
            ctx.stroke();
            
            // Adicionar leve brilho de reflexo na borda (opcional mas sem poluição)
            ctx.beginPath();
            ctx.moveTo(x + 8, y + 5);
            ctx.lineTo(x + w - 8, y + 5);
            ctx.strokeStyle = '#ffffff30';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        // Desenha líquido dentro do recipiente cilíndrico (cor viva uniforme)
        function drawLiquid(x, y, w, h, liquidHeightPx, color) {
            if (liquidHeightPx <= 0) return;
            
            // Altura do líquido a partir da BASE do recipiente
            const liquidHeight = Math.min(h, Math.max(0, liquidHeightPx));
            const liquidY = y + (h - liquidHeight);
            
            ctx.save();
            ctx.beginPath();
            // Recortar formato cilíndrico (mesmo arredondamento)
            ctx.moveTo(x + radiusCorner, y);
            ctx.lineTo(x + w - radiusCorner, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radiusCorner);
            ctx.lineTo(x + w, y + h - radiusCorner);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radiusCorner, y + h);
            ctx.lineTo(x + radiusCorner, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radiusCorner);
            ctx.lineTo(x, y + radiusCorner);
            ctx.quadraticCurveTo(x, y, x + radiusCorner, y);
            ctx.closePath();
            ctx.clip();
            
            // Desenhar retângulo do líquido (cor sólida viva)
            ctx.fillStyle = color;
            ctx.fillRect(x, liquidY, w, liquidHeight);
            
            // Pequeno degradê sutil para dar efeito de volume (opcional, sem comprometer simplicidade)
            // mas para manter "cor viva uniforme" sem excessos, apenas uma leve sobreposição suave
            // NÃO adicionamos gradiente complexo. Apenas cor sólida.
            ctx.restore();
            
            // Borda extra de contorno na superfície do líquido (linha horizontal sutil)
            ctx.beginPath();
            ctx.moveTo(x + 2, liquidY);
            ctx.lineTo(x + w - 2, liquidY);
            ctx.strokeStyle = '#ffffff60';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Atualiza a transição dos líquidos baseado no tempo
        function updateLiquids(deltaSec) {
            if (deltaSec > 0.05) deltaSec = 0.05;
            if (deltaSec <= 0) return;

            // FASE 0: Laranja diminuindo (esq) de cheio para 1/4, Roxo subindo (dir) de 1/4 para 3/4
            if (fase === 0) {
                let leftChanged = false;
                let rightChanged = false;
                
                if (Math.abs(leftLiquidHeight - leftTarget) > 0.5) {
                    const step = transitionSpeed * deltaSec;
                    if (leftLiquidHeight > leftTarget) {
                        leftLiquidHeight = Math.max(leftTarget, leftLiquidHeight - step);
                    } else {
                        leftLiquidHeight = Math.min(leftTarget, leftLiquidHeight + step);
                    }
                    leftChanged = true;
                }
                
                if (Math.abs(rightLiquidHeight - rightTarget) > 0.5) {
                    const step = transitionSpeed * deltaSec;
                    if (rightLiquidHeight < rightTarget) {
                        rightLiquidHeight = Math.min(rightTarget, rightLiquidHeight + step);
                    } else {
                        rightLiquidHeight = Math.max(rightTarget, rightLiquidHeight - step);
                    }
                    rightChanged = true;
                }
                
                // Quando ambos atingirem os alvos com precisão, inicia pausa
                if (!leftChanged && !rightChanged) {
                    fase = 1; // pausa
                    timer = 0;
                }
            }
            // FASE 1: PAUSA (400ms)
            else if (fase === 1) {
                timer += deltaSec;
                if (timer >= 0.4) {
                    // Prepara reverso: laranja vai de 1/4 para 3/4, roxo vai de 3/4 para 1/4
                    leftTarget = rightThreeQuarters;   // laranja sobe para 3/4 (atenção: recipiente esquerdo)
                    rightTarget = rightQuarter;        // roxo desce para 1/4
                    fase = 2;
                    timer = 0;
                }
            }
            // FASE 2: Laranja subindo (esq) de 1/4 para 3/4, Roxo descendo (dir) de 3/4 para 1/4
            else if (fase === 2) {
                let leftChanged = false;
                let rightChanged = false;
                
                if (Math.abs(leftLiquidHeight - leftTarget) > 0.5) {
                    const step = transitionSpeed * deltaSec;
                    if (leftLiquidHeight < leftTarget) {
                        leftLiquidHeight = Math.min(leftTarget, leftLiquidHeight + step);
                    } else {
                        leftLiquidHeight = Math.max(leftTarget, leftLiquidHeight - step);
                    }
                    leftChanged = true;
                }
                
                if (Math.abs(rightLiquidHeight - rightTarget) > 0.5) {
                    const step = transitionSpeed * deltaSec;
                    if (rightLiquidHeight > rightTarget) {
                        rightLiquidHeight = Math.max(rightTarget, rightLiquidHeight - step);
                    } else {
                        rightLiquidHeight = Math.min(rightTarget, rightLiquidHeight + step);
                    }
                    rightChanged = true;
                }
                
                if (!leftChanged && !rightChanged) {
                    fase = 3; // pausa
                    timer = 0;
                }
            }
            // FASE 3: PAUSA (400ms) antes de reiniciar o ciclo
            else if (fase === 3) {
                timer += deltaSec;
                if (timer >= 0.4) {
                    // Reinicia ciclo: laranja vai para 1/4, roxo vai para 3/4
                    leftTarget = leftQuarter;
                    rightTarget = rightThreeQuarters;
                    fase = 0;
                    timer = 0;
                }
            }
        }

        // Renderização completa
        function render() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);
            
            // Desenha líquidos primeiro (para ficarem atrás das bordas? não, ordem: líquido depois contorno?
            // Ordem correta: primeiro líquido (que é recortado), depois contorno do cilindro transparente sobreposto.
            // Melhor desenhar líquido DENTRO do clip, mas o cilindro precisa ser redesenhado por cima para efeito de borda.
            // Método: desenhar líquido, depois desenhar borda do cilindro por cima.
            
            // Líquido LARANJA (esquerda) - COR VIVA
            drawLiquid(leftCylX, cylinderY, cylinderWidth, cylinderHeight, leftLiquidHeight, '#ff7b2c');
            // Líquido ROXO (direita) - COR VIVA uniforme
            drawLiquid(rightCylX, cylinderY, cylinderWidth, cylinderHeight, rightLiquidHeight, '#b45eff');
            
            // Contornos dos recipientes transparentes (por cima dos líquidos)
            drawCylinder(leftCylX, cylinderY, cylinderWidth, cylinderHeight);
            drawCylinder(rightCylX, cylinderY, cylinderWidth, cylinderHeight);
            
            // Pequenos detalhes de brilho nos vidros (apenas para dar aspecto transparente sem poluir)
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(leftCylX + 12, cylinderY + 8, 10, cylinderHeight - 16);
            ctx.fillRect(rightCylX + 12, cylinderY + 8, 10, cylinderHeight - 16);
            ctx.restore();
        }

        // Animação loop
        let lastFrameTime = null;
        
        function animate(nowMs) {
            if (!lastFrameTime) {
                lastFrameTime = nowMs;
                requestAnimationFrame(animate);
                return;
            }
            
            let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if (delta <= 0) {
                lastFrameTime = nowMs;
                requestAnimationFrame(animate);
                return;
            }
            lastFrameTime = nowMs;
            
            updateLiquids(delta);
            render();
            
            requestAnimationFrame(animate);
        }
        
        // Configuração inicial: garantir alturas coerentes
        leftLiquidHeight = cylinderHeight;      // laranja 100%
        rightLiquidHeight = cylinderHeight * 0.25; // roxo 1/4
        leftTarget = leftQuarter;                // primeiro movimento: laranja para 1/4
        rightTarget = rightThreeQuarters;        // roxo para 3/4
        fase = 0;
        timer = 0;
        
        requestAnimationFrame(animate);
        
        // Evitar seleção / interações indesejadas
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('selectstart', (e) => e.preventDefault());
        
        console.log('Sistema ativo: recipientes cilíndricos alternando níveis (laranja↔roxo)');
    })();
</script>
</body>
</html>
