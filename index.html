<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Recipientes Cilíndricos - Líquidos Laranja e Roxo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #0f0f1a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1000" height="600"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            const W = 1000;
            const H = 600;
            canvas.width = W;
            canvas.height = H;
            
            // Posições dos recipientes
            const leftCylX = 250;
            const rightCylX = 750;
            const cylinderY = 200;
            const cylinderRadius = 80;
            const cylinderHeight = 320;
            
            // Alturas dos líquidos (em pixels)
            let leftLiquidHeight = cylinderHeight;
            let rightLiquidHeight = 0;
            
            // Estado da animação
            let lastTimestamp = 0;
            let animationId = null;
            
            // Parâmetros
            const transitionDuration = 2000;
            const pauseDuration = 500;
            
            // Níveis alvo
            const TARGET_LEFT_LOW = cylinderHeight * 0.25;
            const TARGET_LEFT_HIGH = cylinderHeight * 0.75;
            const TARGET_RIGHT_LOW = cylinderHeight * 0.25;
            const TARGET_RIGHT_HIGH = cylinderHeight * 0.75;
            
            let startLeftHeight = cylinderHeight;
            let startRightHeight = 0;
            let targetLeftHeight = TARGET_LEFT_LOW;
            let targetRightHeight = TARGET_RIGHT_HIGH;
            
            let pauseStartTime = 0;
            let transitionStartTime = 0;
            let currentState = "transition";
            
            // Função para desenhar cilindro transparente SEM linha no topo
            function drawCylinder(x, y, radius, height, liquidHeight, liquidColor) {
                const topY = y;
                const bottomY = y + height;
                const liquidTopY = bottomY - liquidHeight;
                
                ctx.save();
                
                // Corpo do cilindro (superfície lateral transparente)
                ctx.beginPath();
                ctx.rect(x - radius, topY, radius * 2, height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Desenhar apenas as bordas verticais do cilindro (sem linha no topo)
                ctx.beginPath();
                ctx.moveTo(x - radius, topY);
                ctx.lineTo(x - radius, bottomY);
                ctx.moveTo(x + radius, topY);
                ctx.lineTo(x + radius, bottomY);
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.6)';
                ctx.stroke();
                
                // Face inferior (elipse - fundo do cilindro)
                ctx.beginPath();
                ctx.ellipse(x, bottomY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
                ctx.stroke();
                
                // ========== LÍQUIDO (preenche a parte destacada) ==========
                if (liquidHeight > 0) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.ellipse(x, bottomY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.rect(x - radius, topY, radius * 2, height);
                    ctx.clip();
                    
                    // Cor viva e uniforme do líquido
                    ctx.fillStyle = liquidColor;
                    ctx.fillRect(x - radius, liquidTopY, radius * 2, liquidHeight);
                    
                    ctx.restore();
                    
                    // Superfície do líquido (elipse destacada)
                    ctx.beginPath();
                    ctx.ellipse(x, liquidTopY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.fillStyle = liquidColor;
                    ctx.fill();
                    
                    // Borda sutil da superfície do líquido
                    ctx.beginPath();
                    ctx.ellipse(x, liquidTopY, radius, radius * 0.35, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // Reforçar bordas laterais (sem linha no topo)
                ctx.beginPath();
                ctx.moveTo(x - radius, topY);
                ctx.lineTo(x - radius, bottomY);
                ctx.moveTo(x + radius, topY);
                ctx.lineTo(x + radius, bottomY);
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.6)';
                ctx.stroke();
                
                ctx.restore();
            }
            
            // Atualizar lógica de transição e pausa
            function updateAnimation(now) {
                if (currentState === "transition") {
                    const elapsed = now - transitionStartTime;
                    let t = Math.min(1, elapsed / transitionDuration);
                    
                    leftLiquidHeight = startLeftHeight + (targetLeftHeight - startLeftHeight) * t;
                    rightLiquidHeight = startRightHeight + (targetRightHeight - startRightHeight) * t;
                    
                    if (t >= 1) {
                        leftLiquidHeight = targetLeftHeight;
                        rightLiquidHeight = targetRightHeight;
                        
                        currentState = "pause";
                        pauseStartTime = now;
                    }
                } 
                else if (currentState === "pause") {
                    const paused = now - pauseStartTime;
                    if (paused >= pauseDuration) {
                        if (targetLeftHeight === TARGET_LEFT_LOW) {
                            startLeftHeight = leftLiquidHeight;
                            startRightHeight = rightLiquidHeight;
                            targetLeftHeight = TARGET_LEFT_HIGH;
                            targetRightHeight = TARGET_RIGHT_LOW;
                        } else {
                            startLeftHeight = leftLiquidHeight;
                            startRightHeight = rightLiquidHeight;
                            targetLeftHeight = TARGET_LEFT_LOW;
                            targetRightHeight = TARGET_RIGHT_HIGH;
                        }
                        
                        currentState = "transition";
                        transitionStartTime = now;
                    }
                }
            }
            
            function animate(timestamp) {
                if (!lastTimestamp) {
                    lastTimestamp = timestamp;
                    requestAnimationFrame(animate);
                    return;
                }
                
                if (transitionStartTime === 0) {
                    transitionStartTime = timestamp;
                    startLeftHeight = cylinderHeight;
                    startRightHeight = 0;
                    targetLeftHeight = TARGET_LEFT_LOW;
                    targetRightHeight = TARGET_RIGHT_HIGH;
                    leftLiquidHeight = cylinderHeight;
                    rightLiquidHeight = 0;
                    currentState = "transition";
                }
                
                updateAnimation(timestamp);
                
                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = '#0f0f1a';
                ctx.fillRect(0, 0, W, H);
                
                // Desenhar recipiente ESQUERDO (líquido laranja)
                drawCylinder(leftCylX, cylinderY, cylinderRadius, cylinderHeight, leftLiquidHeight, '#FF8C42');
                
                // Desenhar recipiente DIREITO (líquido roxo)
                drawCylinder(rightCylX, cylinderY, cylinderRadius, cylinderHeight, rightLiquidHeight, '#9B59B6');
                
                animationId = requestAnimationFrame(animate);
            }
            
            animationId = requestAnimationFrame(animate);
            
            window.addEventListener('beforeunload', () => {
                if (animationId) cancelAnimationFrame(animationId);
            });
        })();
    </script>
</body>
</html>
